# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

# Habilitar Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Definir o papel BLE
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Habilitar USB HID (para uso via cabo USB)
CONFIG_USB=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y

# Habilitar tela OLED
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_SSD1306=y  # Ou CONFIG_ZMK_DISPLAY_SH1106=y, dependendo do controlador do seu OLED
CONFIG_ZMK_SPLIT_USB=y

# Desativar bateria (opcional, se não for usada)
CONFIG_ZMK_POWER=n
